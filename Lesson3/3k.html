<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      // Create a component in React with function.
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);
        };

        async function sendMessage() {
          const newChatMessages = [
            ...chatMessages, 
            {
              message: inputText, 
              sender: 'user', 
              id: crypto.randomUUID()
            }
          ];

          setChatMessages(newChatMessages);

          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages, 
            {
              message: response, 
              sender: 'robot', 
              id: crypto.randomUUID()
            }
          ]);

          setInputText('');
        };

        // Function that runs whenever we hit "enter" in input.
        function handleKeyDown(event) {
          if (event.key === 'Enter') {
            sendMessage();
          } else if (event.key === 'Escape') {
            setInputText('');
          }
        };

        return (
          <>
            <input 
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              onKeyDown={handleKeyDown}
              value={inputText}
            />
            <button
              onClick={sendMessage}
              >Send
            </button>
          </>
        );
      };

      // Chat Message Component
      // function ChatMessage(props) {
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;

        // Destructuring
        // const { message, sender } = props;
        /*
        if (sender === 'robot') {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message}
            </div>
          );
        }
        */

        // Using if-statements directly in JSX.
        return (
          <div>
            {sender === 'robot' && (
              <img src="robot.png" width="50"/>
            )}
            {message}
            {sender === 'user' && (
              <img src="user.png" width="50"/>
            )}
          </div>
        );
      };

      // ChatMessages Component
      function ChatMessages({ chatMessages }) {
        // Convert each chat message into a ChatMessage component.
        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      };

      // App Component
      function App() {
        // Convert chatMessages to state.
        // Save chat messages data in array.
        const [chatMessages, setChatMessages] = React.useState([{
          message: 'hello chatbot', 
          sender: 'user', 
          id: 'id1'
          }, {
            message: 'Hello! How can I help you?', 
            sender: 'robot', 
            id: 'id2'
          }, {
            message: 'can you get me todays date?', 
            sender: 'user', 
            id: 'id3'
          }, {
            message: 'Today is March 25', 
            sender: 'robot', 
            id: 'id4'
          }
        ]);
        
        // const { chatMessages, setChatMessages } = array;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];

        return (
          <>
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          
            <ChatMessages 
              chatMessages={chatMessages}
            />
          </>
        );
      };


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
